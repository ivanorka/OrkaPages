<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ORKA Pages</title>
    <style>
      :root {
        --navy: #071b2f;
        --blue: #11789a;
        --cyan: #78def0;
        --paper: #f4f8fb;
        --white: #ffffff;
        --muted: rgba(255, 255, 255, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--white);
        background:
          radial-gradient(circle at 84% 18%, rgba(17, 120, 154, 0.55), transparent 34%),
          linear-gradient(135deg, var(--navy), #0d2d49);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        align-content: center;
        width: min(1080px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 64px 0;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--cyan);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 820px;
        margin: 0 0 18px;
        font-size: clamp(52px, 8vw, 104px);
        line-height: 0.92;
        letter-spacing: 0;
      }

      p {
        max-width: 720px;
        margin: 0 0 36px;
        color: var(--muted);
        font-size: 21px;
        line-height: 1.5;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      a {
        display: grid;
        min-height: 180px;
        align-content: space-between;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.08);
      }

      a:hover {
        border-color: rgba(120, 222, 240, 0.72);
        background: rgba(255, 255, 255, 0.12);
      }

      strong {
        display: block;
        font-size: 28px;
        line-height: 1.1;
      }

      span {
        color: var(--cyan);
        font-weight: 850;
      }

      @media (max-width: 760px) {
        .links {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <p class="eyebrow">ORKA investor and operating pages</p>
        <h1>ORKA Pages :)</h1>
        <p>Odaberi web koji želiš otvoriti. Ova početna stranica služi kao ulaz za GitHub Pages deployment.</p>
        <div class="links">
          <a href="./orka-investor-web/">
            <strong>Investor Ready One Pager</strong>
            <span>Otvori investor web</span>
          </a>
          <a href="./orka-sales-plan-web/">
            <strong>Sales Operating Plan 2028</strong>
            <span>Otvori sales plan web</span>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
